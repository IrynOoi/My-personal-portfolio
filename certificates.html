<!-- certificates.html -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates - My Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="certificates-page">
    <header id="top">
        <div id="nav-placeholder"></div>
        <div class="hero">
            <h1>CERTIFICATES</h1>
        </div>
    </header>

    <main>
        <section id="certificates" class="container">
            <div class="certificate-grid">
                <!-- Certificate 1: AI Singapore -->
                <div class="certificate-card">
                    <div class="certificate-img-container">
                        <img src="certificates/certAI.jpg" alt="AI Singapore Certificate">
                    </div>
                </div>

                <!-- Certificate 2: Database Foundations -->
                <div class="certificate-card">
                    <div class="certificate-img-container">
                        <img src="certificates/db_Pro_cert.jpg" alt="Database Foundations Certificate">
                    </div>
                </div>

                <!-- Certificate 3: ISTQB Test Management -->
                <div class="certificate-card">
                    <div class="certificate-img-container">
                        <img src="certificates/ISTQB_test_management.jpg" alt="ISTQB Test Management Certificate">
                    </div>
                </div>

                <!-- Certificate 4: Mastery Certificate -->
                <div class="certificate-card">
                    <div class="certificate-img-container">
                        <img src="certificates/Mastery_cert_OOI XIEN XIEN.jpg"
                            alt="Mastery Certificate - OOI XIEN XIEN">
                    </div>
                </div>

                <!-- Certificate 5: Completion Training -->
                <div class="certificate-card">
                    <div class="certificate-img-container">
                        <img src="certificates/OOI XIEN XIEN - Completion Training.jpg"
                            alt="Completion Training Certificate">
                    </div>
                </div>

                <!-- Certificate 6: GitHub Participation -->
                <div class="certificate-card">
                    <div class="certificate-img-container">
                        <img src="certificates/SIJIL GITHUB PENYERTAAN 30 PESERTA-17.jpg"
                            alt="GitHub Workshop Participation">
                    </div>
                </div>

                <!-- Certificate 7: Raspberry Pi Pico -->
                <div class="certificate-card">
                    <div class="certificate-img-container">
                        <img src="certificates/SIJIL PENYERTAAN PESERTA RASPBERRY PI PICO.jpg"
                            alt="Raspberry Pi Pico Certificate">
                    </div>
                </div>

                <!-- Certificate 8: UTeM Hackathon (Ketua) -->
                <div class="certificate-card">
                    <div class="certificate-img-container portrait">
                        <img src="certificates/UTEM_HACKATHON_KETUA_mycert.jpg" alt="UTeM Hackathon - Team Leader">
                    </div>
                </div>

                <!-- Certificate 9: TopCoder -->
                <div class="certificate-card">
                    <div class="certificate-img-container">
                        <img src="certificates/UTEMB032310183_topcoder.jpg" alt="TopCoder Certificate">
                    </div>
                </div>
            </div>
        </section>

    
    </main>

    <div id="footer-placeholder"></div>

    <!-- Modal for Certificate Zoom -->
    <div id="cert-modal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modal-img">
        <div id="modal-caption"></div>
    </div>
    <script src="components.js"></script>

    <script src="script.js"></script>
</body>

</html>
