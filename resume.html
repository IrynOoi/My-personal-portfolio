<!-- resume.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - My Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header id="top">
        <div id="nav-placeholder"></div>
    </header>

    <main>
        <section id="resume-display" class="container" style="padding-top: 2rem;">
            <h2><i class="fas fa-file-alt"></i> My Resume</h2>

            <div style="display: flex; flex-direction: column; align-items: center; gap: 2.5rem; margin-top: -1rem;">

                <div style="transition: transform 0.4s ease;" onmouseover="this.style.transform='translateY(-8px)'"
                    onmouseout="this.style.transform='translateY(0)'">
                    <img src="resume/resume_latest.jpg" alt="Resume Preview - Ooi Xien Xien"
                        style="max-width: 100%; height: auto; border-radius: 12px; box-shadow: var(--card-shadow); border: 1px solid var(--card-border);">
                </div>

                <div>
                    <a href="resume/Resume_Ooi_Xien_Xien.pdf" download="Resume_Ooi_Xien_Xien.pdf" class="btn"
                        style="display: inline-flex; align-items: center; gap: 10px; text-decoration: none; margin-top: 0;">
                        <i class="fas fa-download"></i> Download Full Resume
                    </a>
                </div>

                <p style="font-size: 1rem; color: var(--text-muted); text-align: center;">
                    <i class="fas fa-info-circle"></i> If the download doesn't start automatically,
                    <a href="resume/Resume_Ooi_Xien_Xien.pdf" target="_blank"
                        style="color: var(--color-dark); font-weight: 700; text-decoration: none; border-bottom: 2px solid var(--color-light);">
                        click here to open the PDF
                    </a>
                    and save it from your browser.
                </p>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="components.js"></script>
    <script src="script.js"></script>
</body>

</html>
