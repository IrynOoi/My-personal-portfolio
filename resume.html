<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume & Contact - My Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header id="top">
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="personal_detail.html">Personal Detail</a></li>
                <li><a href="academic.html">Academic Journey</a></li>
                <li><a href="projects.html">Previous Project</a></li>
                <li><a href="certificates.html">Certificate</a></li>
                <li><a href="resume.html" class="active">My Resume</a></li>
            </ul>
        </nav>
        <div class="hero">
            <h1>Resume & Contact</h1>
            <p id="datetime-display"></p>
        </div>
    </header>

    <main>
        <!-- RESUME SECTION -->
        <section id="resume-download" class="container">
            <h2>My Resume</h2>
            <article class="placeholder-content">
                <p>You can download my full resume by clicking the button below.</p>
                <button class="btn" style="margin-top: 1rem;">Download PDF Resume</button>
            </article>
        </section>

        <!-- CONTACT FORM -->
        <section id="contact" class="container">
            <h2>Get In Touch</h2>
            <article>
                <form id="contact-form" class="contact-form">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="email">Your Email</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" rows="4" placeholder="Write something cool..."></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </article>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Personal Portfolio.</p>
        <div class="footer-links">
            <a href="https://github.com/" target="_blank" rel="noopener">My GitHub</a> |
            <a href="#top">Back to top ↑</a>
        </div>
    </footer>
    
    <script src="script.js"></script>
</body>
